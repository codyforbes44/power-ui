# Async — Netlify Deploy Configuration
# ────────────────────────────────────────────────────────────────
# No build step — pure static HTML/CSS/JS.
# Both /public/ (marketing site) and /app/ (AI workspace) are served.
# The Python server.py is for local use only and is not deployed.
#
# /api/proxy is handled by netlify/functions/proxy.mjs (AI proxy).
# All other /api/* calls (ping, state, sync) only work locally.
# ────────────────────────────────────────────────────────────────

[build]
  publish = "."
  ignore  = "exit 0"


# ── Security Headers ────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Content-Security-Policy = "frame-ancestors 'none'; default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.groq.com https://api.mistral.ai https://api.bfl.ml https://fal.run https://*.fal.run https://*.fal.media https://api.replicate.com https://api-inference.huggingface.co http://127.0.0.1:8188 http://localhost:8188 https://unpkg.com https://identity.netlify.com https://*.netlify.com; frame-src blob: https://identity.netlify.com; img-src 'self' data: blob: https://*.fal.run https://*.fal.media https://*.replicate.delivery; worker-src blob:;"


[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Routing / Redirects ─────────────────────────────────────────

# Root → public marketing homepage (200 rewrite, not redirect)
[[redirects]]
  from   = "/"
  to     = "/public/index.html"
  status = 200

# /login shortcut → public login page
[[redirects]]
  from   = "/login"
  to     = "/public/login.html"
  status = 200

# /signup shortcut
[[redirects]]
  from   = "/signup"
  to     = "/public/login.html?tab=signup"
  status = 200

# /app with no trailing slash
[[redirects]]
  from   = "/app"
  to     = "/app/index.html"
  status = 200

# /app/ SPA fallback
# Note: Netlify serves actual files first, so /app/styles.css etc. are unaffected
[[redirects]]
  from   = "/app/*"
  to     = "/app/index.html"
  status = 200

# /api/proxy → Netlify Function (alias so /api/proxy also works)
[[redirects]]
  from  = "/api/proxy"
  to    = "/.netlify/functions/proxy"
  status = 200
  force  = true

# /api/ping → Netlify Function (returns 200 so ServerSync probe succeeds)
[[redirects]]
  from  = "/api/ping"
  to    = "/.netlify/functions/ping"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/state"
  to     = "/api/not-available.json"
  status = 404
  force  = false

[[redirects]]
  from   = "/api/sync"
  to     = "/api/not-available.json"
  status = 404
  force  = false

[[redirects]]
  from   = "/api/mcp/*"
  to     = "/api/not-available.json"
  status = 404
  force  = false
