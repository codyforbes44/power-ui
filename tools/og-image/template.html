<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG Image Source</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  /* Tokens copied verbatim from public/css/public.css :root — this card
     must read as the same product as the site it's a preview for, not a
     new visual language invented for this one image. */
  :root {
    --primary:       #6366f1;
    --secondary:     #8b5cf6;
    --accent:        #06b6d4;
    --bg:            #030712;
    --text:          #f8fafc;
    --text-muted:    #94a3b8;
    --text-dim:      #64748b;
    --border-s:      rgba(255,255,255,.08);
    --grad:          linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
    --grad-text:     linear-gradient(120deg,#818cf8 0%,#c084fc 50%,#67e8f9 100%);
    --font:          'Inter', system-ui, sans-serif;
    --font-d:        'Outfit', 'Inter', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 60px;
    background:
      radial-gradient(ellipse 640px 420px at 50% -8%, rgba(99,102,241,.22) 0%, transparent 70%),
      radial-gradient(ellipse 520px 360px at 96% 100%, rgba(6,182,212,.10) 0%, transparent 65%),
      var(--bg);
  }

  /* Faint edge vignette so the composition still reads once platforms
     crop to 1.91:1 / 1:1 / 4:5 — keep everything essential centered. */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 160px rgba(3,7,18,.55);
    pointer-events: none;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .mark {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: var(--grad);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #fff;
    box-shadow: 0 0 48px rgba(99,102,241,.45);
    flex-shrink: 0;
  }

  .wordmark-text {
    font-family: var(--font-d);
    font-weight: 700;
    font-size: 30px;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  h1 {
    font-family: var(--font-d);
    font-weight: 800;
    font-size: 64px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: var(--text);
    text-align: center;
    max-width: 900px;
  }

  h1 .accent {
    background: var(--grad-text);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: 22px;
    color: var(--text-muted);
    text-align: center;
    max-width: 620px;
    line-height: 1.55;
  }

  .chips {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1px solid var(--border-s);
    background: rgba(255,255,255,.03);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">
      <div class="mark">✦</div>
      <div class="wordmark-text">Async</div>
    </div>
    <h1>The AI workspace<br /><span class="accent">you deserve.</span></h1>
    <p class="sub">A premium, local-first interface for Claude and every major AI model. Bring your own keys, keep full control.</p>
    <div class="chips">
      <span class="chip"><span class="dot"></span>72 expert skills</span>
      <span class="chip"><span class="dot"></span>subscription, no lock-in</span>
      <span class="chip"><span class="dot"></span>Local-first &amp; open source</span>
    </div>
  </div>
</body>
</html>
