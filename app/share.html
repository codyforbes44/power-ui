<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Conversation — Async</title>
  <meta name="description" content="A read-only shared conversation snapshot from Async AI." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #030712;
      --surface:  #0f172a;
      --surface2: #1e293b;
      --border:   #1e293b;
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --text3:    #64748b;
      --indigo:   #6366f1;
      --font-ui:  'Outfit', 'Inter', sans-serif;
      --font-mono:'JetBrains Mono', monospace;
      --r:        12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 12px;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
    }
    .brand-mark { font-size: 20px; }
    .brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .badge {
      font-size: 10px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      color: #818cf8;
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .try-btn {
      padding: 7px 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .try-btn:hover { opacity: 0.85; }

    /* ── Conversation meta ── */
    .convo-meta {
      width: 100%;
      max-width: 760px;
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .convo-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .convo-info {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .convo-info span { display: flex; align-items: center; gap: 4px; }

    /* ── Messages ── */
    .messages {
      width: 100%;
      max-width: 760px;
      padding: 24px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.2s ease forwards;
    }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 700;
    }
    .user .msg-avatar {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .assistant .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .msg-body {
      max-width: calc(100% - 48px);
    }
    .user .msg-body { align-items: flex-end; display: flex; flex-direction: column; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--r);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .user .msg-bubble {
      background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(139,92,246,0.12));
      border: 1px solid rgba(99,102,241,0.2);
      border-top-right-radius: 4px;
    }
    .assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* Markdown rendering */
    .msg-bubble p  { margin: 0 0 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
      font-weight: 700; margin: 16px 0 8px;
      color: var(--text);
    }
    .msg-bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 4px;
      padding: 1px 5px;
      color: #a5b4fc;
    }
    .msg-bubble pre {
      background: #0a0f1e;
      border: 1px solid #1e2a3f;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 12.5px;
    }
    .msg-bubble ul,.msg-bubble ol { padding-left: 20px; margin: 8px 0; }
    .msg-bubble li { margin: 4px 0; }
    .msg-bubble blockquote {
      border-left: 3px solid rgba(99,102,241,0.4);
      padding-left: 12px;
      color: var(--text2);
      margin: 10px 0;
    }
    .msg-bubble strong { color: var(--text); font-weight: 600; }
    .msg-bubble a { color: #818cf8; }

    .msg-meta {
      font-size: 10px;
      color: var(--text3);
      margin-top: 4px;
      padding: 0 2px;
    }

    /* ── Error / empty states ── */
    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }
    .error-state .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .error-state p { font-size: 14px; line-height: 1.6; }

    /* ── Footer ── */
    .share-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      padding: 16px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text3);
    }
    .share-footer a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
    }
    .share-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/app/index.html">
      <span class="brand-mark">✦</span>
      <span class="brand-name">Async</span>
      <span class="badge">READ-ONLY</span>
    </a>
    <a class="try-btn" href="/app/index.html">Try Async →</a>
  </nav>

  <div class="convo-meta" id="convo-meta">
    <div class="convo-title" id="convo-title">Loading…</div>
    <div class="convo-info" id="convo-info"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="share-footer">
    <span>Shared with <strong>Async</strong> — private AI workspace</span>
    <a href="/app/index.html">Start your own →</a>
  </div>

  <script>
    // ── Simple Markdown renderer ─────────────────────────────
    function renderMarkdown(text) {
      if (!text) return '';
      let html = text
        // Code blocks
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`)
        // Inline code
        .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
        // Bold
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        // Headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Blockquote
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // Unordered list
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        // Ordered list
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // Links
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // Line breaks → paragraphs
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>');

      // Wrap in paragraph if no block elements
      if (!html.startsWith('<h') && !html.startsWith('<pre') && !html.startsWith('<blockquote')) {
        html = `<p>${html}</p>`;
      }
      // Wrap adjacent li's in ul
      html = html.replace(/(<li>.*?<\/li>)+/gs, m => `<ul>${m}</ul>`);
      return html;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }

    function formatCost(c) {
      if (!c || c < 0.000001) return null;
      if (c < 0.01) return `$${(c * 1000).toFixed(3)}m`;
      return `$${c.toFixed(4)}`;
    }

    // ── Decode snapshot from URL hash ───────────────────────
    function decodeSnapshot() {
      const hash = window.location.hash.slice(1);
      if (!hash) return null;
      try {
        // Reverse URL-safe base64
        const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
        const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
        const bytes = atob(padded);
        const json = new TextDecoder().decode(
          new Uint8Array([...bytes].map(c => c.charCodeAt(0)))
        );
        return JSON.parse(json);
      } catch (e) {
        console.error('Failed to decode snapshot:', e);
        return null;
      }
    }

    // ── Render ───────────────────────────────────────────────
    function render() {
      const snap = decodeSnapshot();
      const titleEl = document.getElementById('convo-title');
      const infoEl  = document.getElementById('convo-info');
      const msgsEl  = document.getElementById('messages');

      if (!snap || !snap.msgs?.length) {
        titleEl.textContent = 'Invalid or empty snapshot';
        infoEl.innerHTML = '';
        msgsEl.innerHTML = `
          <div class="error-state">
            <div class="error-icon">🔗</div>
            <h2>Nothing to show</h2>
            <p>This share link is invalid, malformed, or empty.<br>
               Ask the sender for a new link.</p>
          </div>
        `;
        document.title = 'Invalid Share — Async';
        return;
      }

      titleEl.textContent = snap.t || 'Shared Conversation';
      document.title = `${snap.t || 'Shared Conversation'} — Async`;

      infoEl.innerHTML = [
        snap.m  ? `<span>🤖 ${snap.m}</span>` : '',
        snap.at ? `<span>🕐 ${formatDate(snap.at)}</span>` : '',
        `<span>💬 ${snap.msgs.length} message${snap.msgs.length !== 1 ? 's' : ''}</span>`,
      ].filter(Boolean).join('');

      msgsEl.innerHTML = snap.msgs.map((m, i) => {
        const isUser = m.r === 'u';
        const initials = isUser ? 'U' : '✦';
        const costLabel = m.$ ? `<span>${formatCost(m.$)}</span>` : '';
        return `
          <div class="msg ${isUser ? 'user' : 'assistant'}" style="animation-delay:${i * 30}ms">
            <div class="msg-avatar">${initials}</div>
            <div class="msg-body">
              <div class="msg-bubble">${renderMarkdown(m.c || '')}</div>
              ${costLabel ? `<div class="msg-meta">${costLabel}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    render();
  </script>
</body>
</html>
