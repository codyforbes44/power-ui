<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Gallery — Async</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0a0b0f;
      --bg-card:     #111318;
      --bg-hover:    #1a1d26;
      --border:      rgba(255,255,255,0.07);
      --text-main:   #f1f5f9;
      --text-muted:  #64748b;
      --text-dim:    #94a3b8;
      --accent:      #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --danger:      #ef4444;
      --success:     #22c55e;
      --radius:      10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Header ─── */
    .gallery-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(10,11,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .gallery-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .back-btn:hover { background: var(--bg-hover); color: var(--text-main); border-color: rgba(255,255,255,0.14); }

    .gallery-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gallery-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
    }

    .gallery-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── Search & Filters ─── */
    .gallery-search-wrap {
      position: relative;
    }
    .gallery-search {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 34px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 13px;
      width: 220px;
      transition: all 0.15s;
      outline: none;
    }
    .gallery-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); width: 270px; }
    .gallery-search::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    .filter-btn {
      padding: 7px 13px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .sort-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ─── Main Grid ─── */
    .gallery-body {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-grid {
      columns: 4 280px;
      column-gap: 14px;
    }

    @media (max-width: 900px) { .gallery-grid { columns: 2 200px; } }
    @media (max-width: 520px) { .gallery-grid { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: fadeIn 0.35s ease both;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.25);
      border-color: rgba(99,102,241,0.3);
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .gallery-item-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }

    .gallery-item-prompt {
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      line-height: 1.4;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .gallery-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .item-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .item-action-btn:hover { background: rgba(255,255,255,0.22); }
    .item-action-btn.danger:hover { background: rgba(239,68,68,0.6); }

    .gallery-item-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
    }

    /* ─── Empty / Loading ─── */
    .gallery-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      color: var(--text-muted);
      text-align: center;
      gap: 14px;
    }
    .gallery-empty-icon { font-size: 52px; opacity: 0.4; }
    .gallery-empty h3 { font-size: 18px; font-weight: 600; color: var(--text-dim); }
    .gallery-empty p { font-size: 14px; max-width: 360px; line-height: 1.6; }
    .gallery-empty a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 10px 18px;
      background: var(--accent);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .gallery-empty a:hover { opacity: 0.85; }

    .gallery-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Lightbox ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: lbIn 0.2s ease both;
    }
    .lightbox.open { display: flex; }
    @keyframes lbIn { from { opacity:0; } to { opacity:1; } }

    .lightbox-inner {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      width: 100%;
      max-height: 90vh;
      align-items: flex-start;
    }

    .lightbox-img-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      animation: imgIn 0.25s ease both;
    }
    @keyframes imgIn { from { transform: scale(0.96); opacity:0; } to { transform: scale(1); opacity:1; } }

    .lightbox-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .lb-panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .lb-prompt {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.6;
      word-break: break-word;
    }

    .lb-meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }
    .lb-meta-val { color: var(--text-dim); font-weight: 500; }

    .lb-divider { border: none; border-top: 1px solid var(--border); }

    .lb-actions { display: flex; flex-direction: column; gap: 8px; }

    .lb-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-main);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    .lb-btn:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
    .lb-btn.danger { color: var(--danger); }
    .lb-btn.danger:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }

    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
      transition: all 0.15s;
    }
    .lightbox-close:hover { background: var(--bg-hover); color: var(--text-main); }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 210;
      transition: all 0.15s;
    }
    .lightbox-nav:hover { background: var(--bg-hover); color: var(--text-main); }
    .lightbox-nav.prev { left: 16px; }
    .lightbox-nav.next { right: 16px; }
    @media (max-width: 700px) {
      .lightbox-inner { flex-direction: column; }
      .lightbox-panel { width: 100%; max-height: 40vh; }
    }

    /* ─── Provider colors ─── */
    .badge-bfl      { background: rgba(236,72,153,0.2); color: #f472b6; }
    .badge-fal      { background: rgba(168,85,247,0.2); color: #c084fc; }
    .badge-replicate{ background: rgba(14,165,233,0.2); color: #38bdf8; }
    .badge-comfyui  { background: rgba(132,204,22,0.2); color: #a3e635; }
    .badge-default  { background: rgba(100,116,139,0.2); color: #94a3b8; }

    /* ─── Toast ─── */
    .gallery-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e2330;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-main);
      z-index: 300;
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.25s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    .gallery-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="gallery-header">
    <div class="gallery-header-left">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="gallery-title">
        🖼 Media Gallery
        <span class="gallery-count" id="gallery-count">0</span>
      </div>
    </div>
    <div class="gallery-header-right">
      <div class="gallery-search-wrap">
        <span class="search-icon">🔍</span>
        <input class="gallery-search" id="gallery-search"
               type="search" placeholder="Search prompts…"
               autocomplete="off" />
      </div>
      <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
      <button class="filter-btn" data-filter="bfl" id="filter-bfl">BFL</button>
      <button class="filter-btn" data-filter="fal" id="filter-fal">fal.ai</button>
      <button class="filter-btn" data-filter="replicate" id="filter-replicate">Replicate</button>
      <select class="sort-select" id="sort-select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="provider">By provider</option>
      </select>
    </div>
  </header>

  <!-- Body -->
  <main class="gallery-body">
    <div id="gallery-loading" class="gallery-loading">
      <div class="spinner"></div>
      <span>Loading your media…</span>
    </div>
    <div class="gallery-grid" id="gallery-grid" style="display:none"></div>
    <div id="gallery-empty" class="gallery-empty" style="display:none">
      <div class="gallery-empty-icon">🖼</div>
      <h3>No images yet</h3>
      <p>Use the <strong>/imagine</strong> command or the 🎨 button in the chat composer to generate your first image.</p>
      <a href="index.html">← Go to Chat</a>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lb-close" title="Close (Esc)">✕</button>
    <button class="lightbox-nav prev" id="lb-prev" title="Previous (←)">‹</button>
    <button class="lightbox-nav next" id="lb-next" title="Next (→)">›</button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap">
        <img class="lightbox-img" id="lb-img" src="" alt="" />
      </div>
      <div class="lightbox-panel">
        <div class="lb-panel-title">Prompt</div>
        <div class="lb-prompt" id="lb-prompt">—</div>
        <hr class="lb-divider" />
        <div>
          <div class="lb-meta-row" style="margin-bottom:6px">
            <span>Provider</span>
            <span class="lb-meta-val" id="lb-provider">—</span>
          </div>
          <div class="lb-meta-row" style="margin-bottom:6px">
            <span>Model</span>
            <span class="lb-meta-val" id="lb-model">—</span>
          </div>
          <div class="lb-meta-row" style="margin-bottom:6px">
            <span>Size</span>
            <span class="lb-meta-val" id="lb-size">—</span>
          </div>
          <div class="lb-meta-row" style="margin-bottom:6px">
            <span>Seed</span>
            <span class="lb-meta-val" id="lb-seed">—</span>
          </div>
          <div class="lb-meta-row">
            <span>Generated</span>
            <span class="lb-meta-val" id="lb-date">—</span>
          </div>
        </div>
        <hr class="lb-divider" />
        <div class="lb-actions">
          <button class="lb-btn" id="lb-copy-prompt">📋 Copy prompt</button>
          <button class="lb-btn" id="lb-download">⬇ Download image</button>
          <button class="lb-btn danger" id="lb-delete">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="gallery-toast" id="gallery-toast"></div>

  <script>
    // ── IndexedDB mirror of ImageDb in app.js ────────────────────────────────
    const ImageDb = (() => {
      const DB_NAME    = 'async_ai_images';
      const DB_VERSION = 1;
      const STORE      = 'images';
      let dbP = null;

      function open() {
        if (dbP) return dbP;
        dbP = new Promise((res, rej) => {
          const r = indexedDB.open(DB_NAME, DB_VERSION);
          r.onupgradeneeded = e => {
            if (!e.target.result.objectStoreNames.contains(STORE))
              e.target.result.createObjectStore(STORE);
          };
          r.onsuccess = e => res(e.target.result);
          r.onerror   = e => rej(e.target.error);
        });
        return dbP;
      }

      async function get(key) {
        const db = await open();
        return new Promise((res, rej) => {
          const req = db.transaction(STORE,'readonly').objectStore(STORE).get(key);
          req.onsuccess = () => res(req.result);
          req.onerror   = () => rej(req.error);
        });
      }

      async function del(key) {
        const db = await open();
        return new Promise((res, rej) => {
          const req = db.transaction(STORE,'readwrite').objectStore(STORE).delete(key);
          req.onsuccess = () => res();
          req.onerror   = () => rej(req.error);
        });
      }

      async function getAllKeys() {
        const db = await open();
        return new Promise((res, rej) => {
          const req = db.transaction(STORE,'readonly').objectStore(STORE).getAllKeys();
          req.onsuccess = () => res(req.result);
          req.onerror   = () => rej(req.error);
        });
      }

      return { get, del, getAllKeys };
    })();

    // ── Parse sessions from localStorage ─────────────────────────────────────
    function parseGalleryItems() {
      const items = [];
      const seen  = new Set();

      // Read sessions from localStorage (same key used by app.js saveState)
      let sessions = [];
      try {
        const raw = localStorage.getItem('cpu_sessions') || localStorage.getItem('async_sessions');
        if (raw) sessions = JSON.parse(raw);
      } catch (_) {}

      for (const sess of sessions) {
        for (const msg of (sess.messages || [])) {
          const c = msg.content || '';

          // Direct /imagine messages: __IMAGE__:{...}
          const imgMatch = c.match(/^__IMAGE__:(.+)$/s);
          if (imgMatch) {
            try {
              const data = JSON.parse(imgMatch[1]);
              const key  = (data.src || '').replace('db:', '');
              if (key && !seen.has(key)) {
                seen.add(key);
                items.push({
                  dbKey:    key,
                  src:      data.src,
                  prompt:   data.prompt   || '',
                  provider: data.provider || 'unknown',
                  model:    data.model    || '',
                  width:    data.width    || null,
                  height:   data.height   || null,
                  seed:     data.seed     || null,
                  timingS:  data.timingS  || null,
                  ts:       msg.timestamp || msg.id || 0,
                  sessionName: sess.title || sess.name || 'Chat',
                  // batch images
                  batchImages: (data.images || []).map((bi, i) => ({
                    dbKey: (bi.src || '').replace('db:', ''),
                    src:   bi.src,
                    seed:  bi.seed,
                    prompt:   data.prompt,
                    provider: data.provider,
                    model:    data.model,
                    width:    data.width,
                    height:   data.height,
                    ts:       msg.timestamp || msg.id || 0,
                    sessionName: sess.title || sess.name || 'Chat',
                  }))
                });
                // Push batch images as individual items too
                for (const bi of (data.images || [])) {
                  const bKey = (bi.src || '').replace('db:', '');
                  if (bKey && !seen.has(bKey)) {
                    seen.add(bKey);
                    items.push({
                      dbKey: bKey,
                      src: bi.src,
                      prompt: data.prompt || '',
                      provider: data.provider || 'unknown',
                      model: data.model || '',
                      width: data.width || null,
                      height: data.height || null,
                      seed: bi.seed || null,
                      ts: msg.timestamp || msg.id || 0,
                      sessionName: sess.title || sess.name || 'Chat',
                      batchImages: []
                    });
                  }
                }
              }
            } catch (_) {}
          }

          // Tool-use image results: __TOOL_IMAGE__:{...}
          const toolMatch = c.match(/^__TOOL_IMAGE__:(.+)$/s);
          if (toolMatch) {
            try {
              const data = JSON.parse(toolMatch[1]);
              const key  = (data.src || '').replace('db:', '');
              if (key && !seen.has(key)) {
                seen.add(key);
                items.push({
                  dbKey: key,
                  src: data.src,
                  prompt: data.prompt || '',
                  provider: data.provider || 'unknown',
                  model: data.model || '',
                  width: data.width || null,
                  height: data.height || null,
                  seed: data.seed || null,
                  ts: msg.timestamp || 0,
                  sessionName: sess.title || sess.name || 'Chat',
                  batchImages: []
                });
              }
            } catch (_) {}
          }
        }
      }

      // Also scan IndexedDB keys not found in sessions (orphaned images)
      return items;
    }

    // ── Globals ───────────────────────────────────────────────────────────────
    let allItems    = [];   // {dbKey, src, prompt, provider, ...}
    let filtered    = [];   // currently visible items
    let activeFilter = 'all';
    let activeSort   = 'newest';
    let searchQuery  = '';
    let lbIndex      = 0;  // lightbox current index into filtered[]

    // ── Load and render ───────────────────────────────────────────────────────
    async function loadGallery() {
      const grid    = document.getElementById('gallery-grid');
      const loading = document.getElementById('gallery-loading');
      const empty   = document.getElementById('gallery-empty');

      allItems = parseGalleryItems();

      // For items with db: src, check they actually exist in IndexedDB
      const dbKeys = new Set(await ImageDb.getAllKeys().catch(() => []));
      allItems = allItems.filter(item => {
        if (!item.src) return false;
        if (item.src.startsWith('db:')) return dbKeys.has(item.dbKey);
        return true; // URL-based image, keep it
      });

      loading.style.display = 'none';

      applyFiltersAndRender();
    }

    function applyFiltersAndRender() {
      const grid  = document.getElementById('gallery-grid');
      const empty = document.getElementById('gallery-empty');

      let items = [...allItems];

      // Filter by provider
      if (activeFilter !== 'all') {
        items = items.filter(i => i.provider === activeFilter);
      }

      // Filter by search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = items.filter(i =>
          (i.prompt || '').toLowerCase().includes(q) ||
          (i.provider || '').toLowerCase().includes(q) ||
          (i.model || '').toLowerCase().includes(q)
        );
      }

      // Sort
      if (activeSort === 'newest') items.sort((a, b) => tsOf(b) - tsOf(a));
      else if (activeSort === 'oldest') items.sort((a, b) => tsOf(a) - tsOf(b));
      else if (activeSort === 'provider') items.sort((a, b) => a.provider.localeCompare(b.provider));

      filtered = items;

      document.getElementById('gallery-count').textContent = items.length;

      if (items.length === 0) {
        grid.style.display  = 'none';
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';
      grid.style.display  = 'block';
      grid.innerHTML      = '';

      items.forEach((item, idx) => {
        const card = buildCard(item, idx);
        grid.appendChild(card);
      });
    }

    function tsOf(item) {
      // ts might be a number (ms) or ISO string or message id like "msg_..."
      if (!item.ts) return 0;
      const n = Number(item.ts);
      if (!isNaN(n)) return n;
      const d = new Date(item.ts);
      return isNaN(d) ? 0 : d.getTime();
    }

    function buildCard(item, idx) {
      const card = document.createElement('div');
      card.className = 'gallery-item';
      card.dataset.index = idx;

      const provClass = `badge-${item.provider || 'default'}`;
      const provLabel = item.provider || '?';

      // Image element — loads lazily
      const img = document.createElement('img');
      img.alt      = item.prompt || 'Generated image';
      img.loading  = 'lazy';
      img.style.opacity = '0';
      img.style.transition = 'opacity 0.3s';
      img.onload = () => { img.style.opacity = '1'; };

      if (item.src && item.src.startsWith('db:')) {
        ImageDb.get(item.dbKey).then(dataUrl => {
          if (dataUrl) img.src = dataUrl;
        }).catch(() => {});
      } else {
        img.src = item.src;
      }

      const overlay = document.createElement('div');
      overlay.className = 'gallery-item-overlay';
      overlay.innerHTML = `
        <div class="gallery-item-prompt">${esc(item.prompt)}</div>
        <div class="gallery-item-actions">
          <button class="item-action-btn" title="Copy prompt" onclick="event.stopPropagation(); copyPrompt(${idx})">📋</button>
          <button class="item-action-btn" title="Download" onclick="event.stopPropagation(); downloadItem(${idx})">⬇</button>
          <button class="item-action-btn danger" title="Delete" onclick="event.stopPropagation(); deleteItem(${idx})">🗑</button>
        </div>
      `;

      const badge = document.createElement('div');
      badge.className = `gallery-item-badge ${provClass}`;
      badge.textContent = provLabel.toUpperCase();

      card.appendChild(img);
      card.appendChild(overlay);
      card.appendChild(badge);

      card.addEventListener('click', () => openLightbox(idx));

      return card;
    }

    function esc(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    async function openLightbox(idx) {
      lbIndex = idx;
      const lb  = document.getElementById('lightbox');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      await renderLightboxItem();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      document.getElementById('lb-img').src = '';
    }

    async function renderLightboxItem() {
      const item = filtered[lbIndex];
      if (!item) return;

      const lbImg = document.getElementById('lb-img');
      lbImg.style.opacity = '0';

      if (item.src && item.src.startsWith('db:')) {
        const dataUrl = await ImageDb.get(item.dbKey).catch(() => null);
        lbImg.src = dataUrl || '';
      } else {
        lbImg.src = item.src || '';
      }

      lbImg.onload = () => { lbImg.style.opacity = '1'; lbImg.style.transition = 'opacity 0.2s'; };

      document.getElementById('lb-prompt').textContent   = item.prompt || '—';
      document.getElementById('lb-provider').textContent = item.provider || '—';
      document.getElementById('lb-model').textContent    = item.model   || '—';
      document.getElementById('lb-size').textContent     =
        item.width && item.height ? `${item.width} × ${item.height}` : '—';
      document.getElementById('lb-seed').textContent     = item.seed ?? '—';

      const d = tsOf(item);
      document.getElementById('lb-date').textContent = d
        ? new Date(d).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' })
        : '—';

      // Prev/Next visibility
      document.getElementById('lb-prev').style.visibility = lbIndex > 0 ? 'visible' : 'hidden';
      document.getElementById('lb-next').style.visibility = lbIndex < filtered.length - 1 ? 'visible' : 'hidden';
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    async function getItemDataUrl(idx) {
      const item = filtered[idx];
      if (!item) return null;
      if (item.src && item.src.startsWith('db:')) {
        return await ImageDb.get(item.dbKey).catch(() => null);
      }
      return item.src;
    }

    async function downloadItem(idx) {
      const dataUrl = await getItemDataUrl(idx);
      if (!dataUrl) { showToast('Image not found'); return; }
      const a = document.createElement('a');
      a.href     = dataUrl;
      a.download = `async-${filtered[idx].provider}-${Date.now()}.png`;
      a.click();
    }

    function copyPrompt(idx) {
      const item = filtered[idx];
      if (!item) return;
      navigator.clipboard.writeText(item.prompt || '').then(() => showToast('✓ Prompt copied'));
    }

    async function deleteItem(idx) {
      const item = filtered[idx];
      if (!item) return;
      if (!confirm(`Delete this image?\n\n"${(item.prompt || '').slice(0, 100)}"`)) return;

      // Delete from IndexedDB
      if (item.dbKey) {
        await ImageDb.del(item.dbKey).catch(() => {});
      }

      // Remove from allItems
      const globalIdx = allItems.findIndex(i => i.dbKey === item.dbKey && i.src === item.src);
      if (globalIdx !== -1) allItems.splice(globalIdx, 1);

      // Close lightbox if open
      const lb = document.getElementById('lightbox');
      if (lb.classList.contains('open')) closeLightbox();

      applyFiltersAndRender();
      showToast('🗑 Image deleted');
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('gallery-toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── Event wiring ──────────────────────────────────────────────────────────
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    document.getElementById('lb-prev').addEventListener('click', e => {
      e.stopPropagation();
      if (lbIndex > 0) { lbIndex--; renderLightboxItem(); }
    });
    document.getElementById('lb-next').addEventListener('click', e => {
      e.stopPropagation();
      if (lbIndex < filtered.length - 1) { lbIndex++; renderLightboxItem(); }
    });

    document.getElementById('lb-copy-prompt').addEventListener('click', () => copyPrompt(lbIndex));
    document.getElementById('lb-download').addEventListener('click', () => downloadItem(lbIndex));
    document.getElementById('lb-delete').addEventListener('click', () => deleteItem(lbIndex));

    // Keyboard nav
    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft'  && lbIndex > 0) { lbIndex--; renderLightboxItem(); }
      if (e.key === 'ArrowRight' && lbIndex < filtered.length - 1) { lbIndex++; renderLightboxItem(); }
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        applyFiltersAndRender();
      });
    });

    // Sort
    document.getElementById('sort-select').addEventListener('change', e => {
      activeSort = e.target.value;
      applyFiltersAndRender();
    });

    // Search (debounced)
    let searchTimer = null;
    document.getElementById('gallery-search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.trim();
        applyFiltersAndRender();
      }, 200);
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    loadGallery();
  </script>
</body>
</html>
