<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Claude Power UI</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/public.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-inner { max-width: 480px; }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      background: var(--grad-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .error-sub   { color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand" style="text-decoration:none;display:flex;align-items:center;gap:10px">
        <div class="brand-logo" style="width:32px;height:32px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">✦</div>
        <span style="font-weight:700;color:var(--text)">Claude Power UI</span>
      </a>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-sub">The page you're looking for doesn't exist, or this feature only works when running the local server.</p>
      <div class="error-actions">
        <a href="/" class="btn-primary">← Back to Home</a>
        <a href="/app/" class="btn-secondary">Open App</a>
      </div>
    </div>
  </div>
</body>
</html>
